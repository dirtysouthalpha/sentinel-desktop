[tox]
envlist = py314
isolated_build = true

[testenv]
description = Run pytest with {envname}
deps =
    pytest ~= 8.0
    pytest-asyncio ~= 0.23
    pytest-cov ~= 4.1
    pytest-timeout ~= 2.3
    Pillow ~= 12.2
    bcrypt ~= 4.1
    customtkinter ~= 5.2
    fastapi ~= 0.110
    httpx ~= 0.27
    psutil ~= 5.9
    pyautogui ~= 0.9.54
    pydantic ~= 2.5
    pyperclip ~= 1.8
    requests ~= 2.31
    uvicorn ~= 0.27
    websockets ~= 12.0
    opencv-python ~= 4.8
    pytesseract ~= 0.3.10
    mss ~= 9.0
    pystray ~= 0.19
commands =
    pytest -q --timeout=10 {posargs}

[testenv:py310]
basepython = python3.10

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13

[testenv:py314]
basepython = python3.14

[pytest]
testpaths = tests
addopts = -q --timeout=10
