[mypy]
python_version = 3.8
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = False
# Don't fail on missing stubs for third-party libraries.
ignore_missing_imports = True
# Be permissive on legacy Python idioms.
allow_untyped_defs = True
allow_untyped_calls = True
allow_redefinition = True
# Don't check tests' types strictly.
[mypy-tests.*]
ignore_errors = True
# customtkinter has no type stubs.
[mypy-customtkinter.*]
ignore_errors = True
[mypy-pyautogui.*]
ignore_errors = True
[mypy-mss.*]
ignore_errors = True
[mypy-keyboard.*]
ignore_errors = True
[mypy-pygetwindow.*]
ignore_errors = True
[mypy-win32gui]
ignore_errors = True
[mypy-win32con]
ignore_errors = True
