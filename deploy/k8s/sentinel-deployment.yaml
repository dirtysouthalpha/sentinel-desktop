apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-desktop
  labels:
    app: sentinel-desktop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-desktop
  template:
    metadata:
      labels:
        app: sentinel-desktop
    spec:
      containers:
      - name: sentinel
        image: dirtysouthalpha/sentinel-desktop:latest
        ports:
        - containerPort: 8091
        env:
        - name: SENTINEL_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: sentinel-secrets
              key: api-token
        - name: SENTINEL_REDIS_URL
          value: "redis://redis-service:6379"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8091
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8091
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-service
spec:
  selector:
    app: sentinel-desktop
  ports:
  - port: 80
    targetPort: 8091
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentinel-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentinel-desktop
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sentinel-telemetry-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
